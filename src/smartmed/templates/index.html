<!DOCTYPE html>
<html lang="zh-Hant">

<head>
	<meta charset="UTF-8">
	<title>SmartMed 攝影機管理系統</title>
	<style>
		:root {
			--primary: #2563eb;
			--success: #16a34a;
			--danger: #dc2626;
			--bg: #f8fafc;
		}

		body {
			font-family: 'Segoe UI', system-ui, sans-serif;
			background: var(--bg);
			display: flex;
			justify-content: center;
			padding: 40px;
			margin: 0;
		}

		.card {
			background: white;
			padding: 2rem;
			border-radius: 12px;
			box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
			width: 100%;
			max-width: 700px;
			text-align: center;
		}

		h1 {
			color: #1e293b;
			margin-bottom: 1.5rem;
		}

		.controls {
			display: flex;
			gap: 10px;
			justify-content: center;
			align-items: center;
			margin-bottom: 20px;
			flex-wrap: wrap;
		}

		select {
			padding: 8px 12px;
			border-radius: 6px;
			border: 1px solid #cbd5e1;
			font-size: 14px;
			min-width: 200px;
		}

		button {
			padding: 8px 20px;
			border-radius: 6px;
			border: none;
			cursor: pointer;
			font-weight: 600;
			transition: opacity 0.2s;
		}

		.btn-refresh {
			background: #64748b;
			color: white;
		}

		.btn-start {
			background: var(--success);
			color: white;
		}

		.btn-stop {
			background: var(--danger);
			color: white;
		}

		button:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.video-container {
			width: 100%;
			aspect-ratio: 16/9;
			background: #0f172a;
			border-radius: 8px;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
		}

		#stream {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: none;
		}

		.status-overlay {
			color: #94a3b8;
			font-size: 14px;
		}

		.badge {
			padding: 4px 12px;
			border-radius: 20px;
			font-size: 12px;
			margin-top: 10px;
			display: inline-block;
		}

		.online {
			background: #dcfce7;
			color: #166534;
		}
	</style>
</head>

<body>

	<div class="card">
		<h1>SmartMed Camera</h1>

		<div class="controls">
			<select id="cameraSelect">
				<option value="">正在初始化攝影機清單...</option>
			</select>
			<button class="btn-refresh" onclick="refreshList()">🔄 重新整理</button>
		</div>

		<div class="video-container">
			<img id="stream" src="" alt="Video Stream">
			<div id="placeholder" class="status-overlay">攝影機尚未啟動</div>
		</div>

		<div class="controls" style="margin-top: 20px;">
			<button id="startBtn" class="btn-start" onclick="toggleCamera('start')">▶ 啟動串流</button>
			<button id="stopBtn" class="btn-stop" onclick="toggleCamera('stop')" disabled>⏹ 停止</button>
		</div>

		<div id="activeInfo" style="display: none;">
			<span class="badge online" id="currentCamName"></span>
		</div>
	</div>

	<script>
		const cameraSelect = document.getElementById('cameraSelect');
		const streamImg = document.getElementById('stream');
		const placeholder = document.getElementById('placeholder');
		const startBtn = document.getElementById('startBtn');
		const stopBtn = document.getElementById('stopBtn');
		const activeInfo = document.getElementById('activeInfo');

		// 初始化載入
		window.onload = refreshList;

		async function refreshList() {
			cameraSelect.innerHTML = '<option value="">掃描中...</option>';
			try {
				const res = await fetch('/list');
				const data = await res.json();
				cameraSelect.innerHTML = '';

				if (!data.cameras || data.cameras.length === 0) {
					cameraSelect.innerHTML = '<option value="">找不到可用攝影機</option>';
					return;
				}

				data.cameras.forEach(cam => {
					const opt = document.createElement('option');
					opt.value = cam.id;
					opt.textContent = cam.name; // 顯示 pygrabber 抓到的名稱
					cameraSelect.appendChild(opt);
				});
			} catch (err) {
				cameraSelect.innerHTML = '<option value="">連線錯誤</option>';
			}
		}

		async function toggleCamera(action) {
			if (action === 'start') {
				const deviceId = cameraSelect.value;
				if (deviceId === "") return alert("請先選擇攝影機");

				const res = await fetch(`/start?device_id=${deviceId}`);
				const data = await res.json();

				if (data.status === 'started' || data.status === 'already running') {
					streamImg.src = "/video_feed?t=" + Date.now();
					streamImg.style.display = 'block';
					placeholder.style.display = 'none';

					startBtn.disabled = true;
					stopBtn.disabled = false;
					cameraSelect.disabled = true;
					activeInfo.style.display = 'block';
					document.getElementById('currentCamName').textContent = `正在使用: ${cameraSelect.options[cameraSelect.selectedIndex].text}`;
				}
			} else {
				await fetch('/stop');
				streamImg.src = "";
				streamImg.style.display = 'none';
				placeholder.style.display = 'block';

				startBtn.disabled = false;
				stopBtn.disabled = true;
				cameraSelect.disabled = false;
				activeInfo.style.display = 'none';
			}
		}
	</script>

</body>

</html>
